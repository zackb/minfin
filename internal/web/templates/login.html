{{define "login"}}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · minfin</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>

<body class="auth-body">
    <div class="card auth-card">
        <img class="logo" src="/static/img/icon.png" alt="minfin logo">
        <h1 class="wordmark">minfin</h1>
        <p class="tagline muted">Sign in to your account.</p>
        {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
        <form method="post" action="/login" class="auth-form">
            <input type="email" name="email" placeholder="Email" value="{{.Email}}" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="primary">Sign in</button>
        </form>
        <p class="muted">No account? <a class="link" href="/signup">Sign up</a></p>
    </div>
</body>

</html>{{end}}
